<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Exp-2A — Class Counter</title>
  <style>body{font-family:Arial,Helvetica,sans-serif;text-align:center;padding:40px} button{padding:8px 12px;font-size:16px}</style>
</head>
<body>
  <h1>Class Counter (static)</h1>
  <h2 id="count">0</h2>
  <button id="inc">Increment</button>

  <script>
    class Counter {
      constructor(initial = 0) {
        this.count = initial;
        this.el = document.getElementById('count');
      }
      increment() {
        this.count += 1;
        this.render();
      }
      render() {
        this.el.textContent = this.count;
      }
    }

    const c = new Counter(0);
    document.getElementById('inc').addEventListener('click', () => c.increment());
  </script>
  <p><a href="../index.html">Back</a></p>
</body>
</html>
