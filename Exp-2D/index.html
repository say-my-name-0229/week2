<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Exp-2D — Conditional Rendering</title>
  <style>body{font-family:Arial,Helvetica,sans-serif;text-align:center;padding:40px} button{padding:8px 12px;font-size:16px}</style>
</head>
<body>
  <h1>Conditional Rendering (static)</h1>
  <button id="toggle">Show Message</button>
  <div id="placeholder" style="margin-top:20px"></div>

  <script>
    const btn = document.getElementById('toggle');
    const ph = document.getElementById('placeholder');
    let shown = false;
    btn.addEventListener('click', () => {
      shown = !shown;
      btn.textContent = shown ? 'Hide Message' : 'Show Message';
      ph.innerHTML = shown ? '<h2>Welcome to the Conditional Rendering Example!</h2>' : '';
    });
  </script>
  <p><a href="../index.html">Back</a></p>
</body>
</html>
